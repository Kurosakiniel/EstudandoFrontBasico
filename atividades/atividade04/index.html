<!--

Atividade 4 — Formulário de Cadastro

Crie uma página de cadastro de usuário.

Ela deve conter:

Nome
Email
Senha
Data de nascimento
Botão de enviar
Tags obrigatórias
form
label
input
button

-->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
</head>
<body>
    <header>
        <h1>Formulario de Cadastro</h1>
        <p>Por favor insira seus dados abaixo:</p>
    </header>  
    <main>
        <form action="">
            <label for="nome">Nome:</label>
            <input type="text">
            <label for="email">Email:</label>
            <input type="text">
            <label for="senha">senha</label>
            <input type="text">
            <label for="Data de nascimento">Data de nascimento</label>
            <input type="date">
            <button>Enviar</button>
        </form>
    </main>
</body>
</html>
